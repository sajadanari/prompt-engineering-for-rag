# سؤال‌های نمونه روی chunkهای واقعی FNP (خروجی شبیه‌سازی‌شده Qdrant).
# پرامپت عملیاتی میدکو در متن پاسخ citation نمی‌نویسد.

questions:
  - q: "بعد از تایید فنی درخواست کالا چه کارتی در کارتابل ایجاد می‌شود؟"
    note: "مسیر خوش — chunk درخواست کالا (سند ۲)."

  - q: "در فرم عودت چک پرداختی فیلدهای مبلغ درخواست و مبلغ پرداخت چه چیزی را نشان می‌دهند؟"
    note: "مسیر خوش — فرآیند بانکی (سند ۴)."

  - q: "در جزئیات هزینه بهایابی، ستون‌های A تا F چه معنایی دارند؟"
    note: "مسیر خوش — بهایابی محصول (سند ۵)."

  - q: "پس از تکمیل فرم تجزیه‌وتحلیل برنامه کنترل ریسک، مرحله بعدی چیست؟"
    note: "مسیر خوش — دستورکار HSE (سند ۶)."

  - q: "اگر موجودی قلم در تاریخ شروع دستورکار کافی نباشد چه می‌توان کرد؟"
    note: "مسیر خوش — اجرای دستورکار نگهداری (سند ۸)."

  - q: "فعالیت DFN.MES.1856 چه زمانی برای کاربر بالا می‌آید؟"
    note: "مسیر خوش — کنترل تولید MES (سند ۹)."

  - q: "کد فرآیند اصلاح قیمت رسید چیست و چه فعالیت‌هایی دارد؟"
    note: "مسیر خوش — اصلاح قیمت رسید (سند ۳)."

  - q: "آیا در این مستندات درباره نحوه تعریف درخت توقفات توضیح گام‌به‌گام آمده است؟"
    note: "پوشش ناقص — سند ۱ عمدتاً فهرست شکل است."

  - q: "چطور می‌توانم رمز عبور ویندوز را عوض کنم؟"
    note: "خارج از محدوده — باید دقیقاً رشته Fallback فارسی برگردد."
