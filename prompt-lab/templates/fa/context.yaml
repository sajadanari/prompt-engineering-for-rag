      شکل 32- جزئیات هزینه
      A- کد مرکز هزینه: در این ستون کد مرکز هزینه به‌صورت سیستمی نمایش داده می‌شود.
      B- مرکز هزینه: این ستون نام مرکز هزینه بر اساس محاسبات به‌صورت سیستمی مقداردهی می‌گردد.
      C- کد عنصر هزینه: در این ستون کد عنصر هزینه به‌صورت سیستمی نمایش داده می‌شود.
      D- نام عنصر هزینه: این قسمت نام عنصر هزینه بر اساس محاسبات به‌صورت سیستمی مقداردهی می‌گردد.
      E- نوع فعالیت: در این قسمت نوع فعالیت به‌صورت سیستمی نمایش داده می‌شود.
      F-مرکز کاری: این ستون نام مرکز کاری بر اساس محاسبات به‌صورت سیستمی مقداردهی می‌گردد.

