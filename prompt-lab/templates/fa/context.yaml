      شکل 5: فرم تعریف افق برنامه‌ریزی _ سناریو فرضی
      پس از ارسال فرم و مشاهده پیغام ثبت موفقیت‌آمیز افق برنامه‌ریزی، سیستم از کاربر می‌پرسد که آیا مایل به انجام پیش‌بینی تقاضا هست یا خیر؟
      شکل 6: هشدار _ پیش‌بینی تقاضا
      مطابق سناریو با کلیک بر روی گزینه "بله" وارد فرم پیش‌بینی تقاضا می‌شویم. در ابتدا فرم تعریف مجموعه پیش‌بینی نمایش داده می‌شود و مطابق سناریو اقدام به تکمیل فیلدها می‌نماییم:
      شکل 7: فرم تعریف مجموعه پیش‌بینی تقاضا
      در این قسمت، محصولاتی که می‌خواهیم برای آن‌ها پیش‌بینی تقاضا صورت پذیرد، انتخاب می‌نماییم. با انتخاب محصول و ارسال فرم مجموعه پیش‌بینی، فرم تعریف پیش‌بینی نمایش داده می‌شود که اقدام به تکمیل آن می‌نماییم:
      شکل 8: فرم پیش‌بینی تقاضا

