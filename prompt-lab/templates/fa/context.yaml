      شکل 91-رابط کاربری تجزیه‌و تحلیل برنامه کنترل ریسک
      مشاهده جزییات چک‌لیست تکمیل‌شده: از این قسمت با کلیک روی دکمه مشاهده می‌توان جزییات چک‌لیست تکمیل‌شده را مشاهده نمود.
      نیاز به ارزیابی مجدد: در این قسمت با فعال کردن نیاز به ارزیابی مجدد، ریسک مربوطه پس از تأیید تجزیه‌وتحلیل برنامه کنترل ریسک جهت ارزیابی مجدد در کارتابل ارزیاب مربوطه فعال می‌گردد.
      بفرست: با کلیک روی بفرست، فرم به مرحله بعد می‌رود.
      شرح پس از ارسال فرم تجزیه‌وتحلیل برنامه کنترل ریسک
      پس از تکمیل فرم تجزیه‌وتحلیل برنامه کنترل ریسک توسط کاربر، فرم تأیید برنامه کنترل ریسک در کارتابل تأییدکننده مشاهده می‌شود.
      فعالیت تأیید برنامه کنترل ریسک
      فعالیت تأیید برنامه کنترل ریسک پس از تجزیه‌وتحلیل برنامه کنترل ریسک می‌باشد.
      فرم تأیید برنامه کنترل ریسک
      این فرم شامل بخش‌های دو زبانه «اطلاعات دستورکار» و «تأیید برنامه کنترل ریسک» می‌باشد.

