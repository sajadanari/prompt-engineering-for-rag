      شکل 45- ویرایش برنامه ریزی زمان بندی بستن حساب – نمای تکمیل فرم
      ارسال: در این حالت بعدازاینکه کاربر اصلاحات موردنیاز را انجام داد برروی دکمه« ارسال» کلیک نموده و سپس اطلاعات برنامه ریزی زمان بندی بستن حساب مربوطه وارد فعالیت تأیید برنامه ریزی زمان بندی بستن حساب شده و منتظر تأیید مسئول مربوطه می‌ماند.
      مابقی فیلدها در قسمت اول همین جزوه توضیح داده شده است.
      پس از ارسال فرم ویرایش برنامه ریزی زمان بندی بستن حساب
